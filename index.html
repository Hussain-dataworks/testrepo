<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Practice</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#2563eb);
            color:white;
            font-family:Arial, sans-serif;
        }

        .card{
            text-align:center;
            padding:40px;
            border-radius:15px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(10px);
        }

        button{
            margin-top:20px;
            padding:12px 24px;
            border:none;
            border-radius:8px;
            background:#38bdf8;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0ea5e9;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Welcome to My Git Practice Project</h1>
        <p>This feature was added on a separate branch.</p>
        <button>Explore</button>
    </div>

</body>
</html>
